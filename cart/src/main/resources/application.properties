spring.application.name=cart
server.port=8084
server.servlet.context-path=/cart
springdoc.api-docs.path=/openapi
springdoc.swagger-ui.path=/docs

# Configuracion BD H2 en memoria cache.
spring.datasource.url=jdbc:h2:mem:cartdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.datasource.generate-unique-name=false

# Configuraciˇn de JPA / Hibernate.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'update' crea las tablas automßticamente al detectar las clases @Entity
spring.jpa.hibernate.ddl-auto=update
# Muestra las consultas SQL en la consola
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
